# Deploys the With Fire web client to GitHub Pages on every push to main.
#
# GitHub Pages is static hosting: SOLO vs AI works fully there, but
# online rooms need the Node server (server/) running somewhere.
# To enable online play from the Pages site, host the server (e.g. on
# Render/Railway/Fly) and set a repository Actions variable named
# WS_URL to its WebSocket endpoint, e.g. wss://withfire.onrender.com/ws.
#
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          VITE_WS_URL: ${{ vars.WS_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
